<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Public Websites — a hub of small, focused web apps by Ankur Mursalin."
    />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
    <title>Public Websites · Ankur Mursalin</title>
  </head>
  <body>
    <header class="hero">
      <h1>Public Websites</h1>
      <p class="lead">
        A hub of small, focused web apps. Each one is its own project — independent
        source, independent release. Pick one to launch.
      </p>
      <div class="search">
        <input
          id="search"
          type="search"
          placeholder="Search sites or tags…"
          autocomplete="off"
          aria-label="Search sites"
        />
      </div>
    </header>

    <main>
      <ul id="grid" class="grid" aria-live="polite"></ul>
      <p id="empty" class="empty" hidden>No sites match that search.</p>
    </main>

    <footer>
      <p class="author">
        Built by
        <a href="https://encryptioner.github.io/" rel="noopener">Mir Mursalin Ankur</a>
      </p>
      <ul class="social">
        <li>
          <a href="https://encryptioner.github.io/" rel="noopener">Portfolio</a>
        </li>
        <li>
          <a href="https://github.com/Encryptioner" rel="noopener">GitHub</a>
        </li>
        <li>
          <a href="https://www.linkedin.com/in/mir-mursalin-ankur" rel="noopener">LinkedIn</a>
        </li>
        <li>
          <a href="https://www.supportkori.com/mirmursalinankur" rel="noopener">Support ♥</a>
        </li>
      </ul>
    </footer>

    <script src="./app.js" type="module"></script>
  </body>
</html>
