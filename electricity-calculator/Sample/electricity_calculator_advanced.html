<html lang="en">

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

            padding: 16px;
            color: #e2e8f0;

            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.95em;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 16px;
            color: #f1f5f9;
        }

        .appliance-selector {
            margin-bottom: 20px;
        }

        .selector-input {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        select {
            flex: 1;
            padding: 10px;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.9em;
        }

        select:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(51, 65, 85, 0.8);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            color: white;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .selected-items {
            max-height: 500px;
            overflow-y: auto;
        }

        .item-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .item-card:hover {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(148, 163, 184, 0.3);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .item-name {
            font-weight: 500;
            color: #f1f5f9;
            font-size: 0.95em;
        }

        .item-postfix {
            font-size: 0.8em;
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 4px 10px;
            font-size: 0.75em;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-remove:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .item-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-field label {
            font-size: 0.75em;
            color: #94a3b8;
            font-weight: 500;
        }

        input[type="number"],
        input[type="text"] {
            padding: 8px 10px;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.85em;
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(51, 65, 85, 0.8);
        }

        .note-input {
            grid-column: 1 / -1;
        }

        .note-input textarea {
            padding: 8px 10px;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.85em;
            font-family: inherit;
            resize: vertical;
            min-height: 50px;
        }

        .note-input textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(51, 65, 85, 0.8);
        }

        .days-input {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .days-input label {
            font-size: 0.95em;
            color: #cbd5e1;
            font-weight: 500;
        }

        .days-input input {

            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 0.95em;
        }

        .days-input input:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(51, 65, 85, 0.8);
        }

        .divider {
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
            margin: 20px 0;
        }

        .result-item {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 16px;

        .result-label {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .result-value {

            font-weight: 700;
            color: #60a5fa;
        }

        .result-secondary {
            font-size: 0.95em;
            color: #34d399;
            margin-top: 8px;
        }

        .breakdown {

        }

        .breakdown-title {
            font-size: 0.95em;
            color: #cbd5e1;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .breakdown-item {

            align-items: center;
            padding: 10px 0;
            font-size: 0.85em;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .breakdown-item:last-child {

        }

        .breakdown-name {
            color: #cbd5e1;
            flex: 1;
        }

        .breakdown-value {
            color: #60a5fa;
            font-weight: 500;
            text-align: right;

        .formula-section {

            border-radius: 8px;
            padding: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-top: 16px;

        .formula-title {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 500;

            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.75em;
            color: #a1f3a2;
            word-break: break-all;
            line-height: 1.4;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-export {

            min-width: 120px;
            padding: 12px 16px;
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-export:hover {
            background: rgba(34, 197, 94, 0.3);
        }

        .btn-reset {

            min-width: 120px;
            padding: 12px 16px;
            background: rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;

            background: rgba(148, 163, 184, 0.3);

            padding: 40px 20px;
            color: #64748b;
        }

            margin-bottom: 16px;

            .main-content {

            h1 {

            .selected-items {

            }

            .result-value {

            }

            .item-inputs {

            }

        }

        .scrollbar::-webkit-scrollbar-track {

        }

            background: white;
            color: #1f2937;

            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 20px;

            font-size: 24px;
            margin-bottom: 5px;
            color: #1f2937;
        }

            font-size: 12px;
            color: #6b7280;

            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            border-bottom: 1px solid #d1d5db;
            padding-bottom: 8px;
        }

            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 13px;
            border-bottom: 1px solid #f3f4f6;
        }

        .export-item-name {
            color: #1f2937;
            font-weight: 500;
        }

        .export-item-value {
            color: #374151;
            text-align: right;
        }

        .export-summary {
            background: #f0f9ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            padding: 16px;
            margin-top: 20px;
        }

        .export-summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .export-summary-label {
            color: #374151;
            font-weight: 600;
        }

        .export-summary-value {
            color: #1f2937;
            font-weight: 700;
        }

        .export-formula {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #4b5563;
            word-break: break-all;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Electricity Usage Calculator</h1>
            <p class="subtitle">Calculate your monthly electricity consumption accurately</p>
        </header>

        <div class="main-content">
            <!-- Left Panel: Appliances Selection -->
            <div class="panel">
                <div class="panel-title">Add Appliances</div>
                
                <div class="appliance-selector">
                    <div class="selector-input">
                        <select id="applianceSelect">
                            <option value="">Select an appliance...</option>
                        </select>
                        <button class="btn btn-add" onclick="addAppliance()">Add</button>
                    </div>
                </div>

                <div class="selected-items scrollbar" id="selectedItems">
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <p>No appliances added yet. Select an appliance and click Add.</p>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Results -->
            <div class="panel">
                <div class="panel-title">Results</div>
                
                <div class="days-input">
                    <label for="daysInput">Days Living in Month</label>
                    <input type="number" id="daysInput" value="30" min="1" max="31" onchange="updateResults()">
                </div>

                <div class="divider"></div>

                <div class="result-item">
                    <div class="result-label">Total Monthly Usage</div>
                    <div class="result-value" id="totalUnits">0</div>
                    <div class="result-secondary">kWh (Units)</div>
                </div>

                <div class="breakdown" id="breakdownSection" style="display: none;">
                    <div class="breakdown-title">Consumption Breakdown</div>
                    <div id="breakdownList"></div>
                </div>

                <div class="formula-section">
                    <div class="formula-title">Your Formula</div>
                    <div class="formula-text" id="formulaText">No appliances added</div>
                </div>

                <div class="action-buttons">
                    <button class="btn-export" onclick="exportToPDF()">📥 Download PDF</button>
                    <button class="btn-export" onclick="captureImage()">📸 Capture Image</button>
                    <button class="btn-reset" onclick="resetCalculator()">Reset All</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden export container -->
    <div id="exportContainer" class="export-container"></div>

        function initializeAppliances() {
            const select = document.getElementById('applianceSelect');
            select.innerHTML = '<option value="">Select an appliance...</option>';
            
            Object.keys(appliances).forEach(category => {
                const optgroup = document.createElement('optgroup');
                optgroup.label = category;
                
                appliances[category].forEach(app => {
                    const option = document.createElement('option');
                    option.value = JSON.stringify(app);
                    option.textContent = `${app.name} (${app.watts}W)`;
                    optgroup.appendChild(option);
                });
                
                select.appendChild(optgroup);
            });
        }

        function addAppliance() {
            const select = document.getElementById('applianceSelect');
            if (!select.value) {
                alert('Please select an appliance');
                return;
            }

            const appliance = JSON.parse(select.value);
            itemCounter++;
            
            const item = {
                id: itemCounter,
                name: appliance.name,
                watts: appliance.watts,
                hours: 8,
                note: ''
            };

            selectedItems.push(item);
            renderSelectedItems();
            updateResults();
            select.value = '';
        }

        function removeItem(id) {
            selectedItems = selectedItems.filter(item => item.id !== id);
            renderSelectedItems();
            updateResults();
        }

        function renderSelectedItems() {
            const container = document.getElementById('selectedItems');
            
            if (selectedItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <p>No appliances added yet. Select an appliance and click Add.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = selectedItems.map((item, idx) => `
                <div class="item-card">
                    <div class="item-header">
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div style="font-size: 0.8em; color: #94a3b8; margin-top: 3px;">${item.watts}W</div>
                        </div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span class="item-postfix">Item ${item.id}</span>
                            <button class="btn btn-remove" onclick="removeItem(${item.id})">Remove</button>
                        </div>
                    </div>
                    <div class="item-inputs">
                        <div class="input-field">
                            <label>Hours/Day</label>
                            <input type="number" value="${item.hours}" min="0" step="0.5" onchange="updateItemHours(${item.id}, this.value)">
                        </div>
                        <div class="input-field">
                            <label>Daily kWh</label>
                            <input type="text" value="${(item.watts * item.hours / 1000).toFixed(3)}" readonly>
                        </div>
                        <div class="input-field note-input">
                            <label>Note (Optional)</label>
                            <textarea placeholder="e.g., Bedroom AC, Living room fan..." onchange="updateItemNote(${item.id}, this.value)">${item.note}</textarea>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateItemHours(id, hours) {
            const item = selectedItems.find(i => i.id === id);
            if (item) {
                item.hours = parseFloat(hours) || 0;
                renderSelectedItems();
                updateResults();
            }
        }

        function updateItemNote(id, note) {
            const item = selectedItems.find(i => i.id === id);
            if (item) {
                item.note = note;
            }
        }

        function updateResults() {
            const days = parseFloat(document.getElementById('daysInput').value) || 30;
            let totalUnits = 0;
            let breakdown = [];
            let formulaParts = [];

            selectedItems.forEach(item => {
                const dailyUnits = (item.watts * item.hours) / 1000;
                const monthlyUnits = dailyUnits * days;
                totalUnits += monthlyUnits;

                breakdown.push({
                    name: item.note ? `${item.name} (${item.note})` : item.name,
                    units: monthlyUnits.toFixed(2)
                });

                formulaParts.push(`${dailyUnits.toFixed(3)} × ${days}`);
            });

            document.getElementById('totalUnits').textContent = totalUnits.toFixed(2);

            if (formulaParts.length > 0) {
                document.getElementById('formulaText').textContent = `(${formulaParts.join(' + ')}) = ${totalUnits.toFixed(2)} kWh`;
            } else {
                document.getElementById('formulaText').textContent = 'No appliances added';
            }

            const breakdownSection = document.getElementById('breakdownSection');
            if (breakdown.length > 0) {
                breakdownSection.style.display = 'block';
                const breakdownList = document.getElementById('breakdownList');
                breakdownList.innerHTML = breakdown
                    .sort((a, b) => parseFloat(b.units) - parseFloat(a.units))
                    .map(item => `
                        <div class="breakdown-item">
                            <span class="breakdown-name">${item.name}</span>
                            <span class="breakdown-value">${item.units} kWh</span>
                        </div>
                    `)
                    .join('');
            } else {
                breakdownSection.style.display = 'none';
            }
        }

        function resetCalculator() {
            if (confirm('Are you sure? This will clear all appliances.')) {
                selectedItems = [];
                itemCounter = 0;
                document.getElementById('daysInput').value = 30;
                renderSelectedItems();
                updateResults();
            }
        }

        function exportToPDF() {
            const days = parseFloat(document.getElementById('daysInput').value) || 30;
            let totalUnits = 0;
            let breakdownItems = [];
            let formulaParts = [];

            selectedItems.forEach(item => {
                const dailyUnits = (item.watts * item.hours) / 1000;
                const monthlyUnits = dailyUnits * days;
                totalUnits += monthlyUnits;

                breakdownItems.push({
                    name: item.note ? `${item.name} (${item.note})` : item.name,
                    hours: item.hours,
                    watts: item.watts,
                    units: monthlyUnits.toFixed(2)
                });

                formulaParts.push(`${dailyUnits.toFixed(3)} × ${days}`);
            });

            const exportContainer = document.getElementById('exportContainer');
            const now = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            exportContainer.innerHTML = `
                <div class="export-header">
                    <h2>⚡ Electricity Usage Report</h2>
                    <p class="export-date">Generated on ${now}</p>
                </div>

                <div class="export-section">
                    <div class="export-section-title">Configuration</div>
                    <div class="export-item">
                        <span class="export-item-name">Days in Month:</span>
                        <span class="export-item-value">${days} days</span>
                    </div>
                    <div class="export-item">
                        <span class="export-item-name">Total Appliances:</span>
                        <span class="export-item-value">${selectedItems.length}</span>
                    </div>
                </div>

                <div class="export-section">
                    <div class="export-section-title">Appliances & Consumption</div>
                    ${breakdownItems.map(item => `
                        <div class="export-item">
                            <span class="export-item-name">${item.name}</span>
                            <span class="export-item-value">${item.units} kWh</span>
                        </div>
                        <div style="font-size: 11px; color: #9ca3af; padding: 0 0 8px 0;">
                            ${item.watts}W × ${item.hours}h/day
                        </div>
                    `).join('')}
                </div>

                <div class="export-summary">
                    <div class="export-summary-row">
                        <span class="export-summary-label">Total Monthly Usage:</span>
                        <span class="export-summary-value">${totalUnits.toFixed(2)} kWh</span>
                    </div>
                </div>

                <div class="export-formula">
                    <strong>Formula:</strong><br>
                    (${formulaParts.join(' + ')}) = ${totalUnits.toFixed(2)} kWh
                </div>
            `;

            const element = exportContainer;
            const opt = {
                margin: 10,
                filename: `electricity_report_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(element).save();
        }

        function captureImage() {
            const days = parseFloat(document.getElementById('daysInput').value) || 30;
            let totalUnits = 0;
            let breakdownItems = [];
            let formulaParts = [];

            selectedItems.forEach(item => {
                const dailyUnits = (item.watts * item.hours) / 1000;
                const monthlyUnits = dailyUnits * days;
                totalUnits += monthlyUnits;

                breakdownItems.push({
                    name: item.note ? `${item.name} (${item.note})` : item.name,
                    hours: item.hours,
                    watts: item.watts,
                    units: monthlyUnits.toFixed(2)
                });

                formulaParts.push(`${dailyUnits.toFixed(3)} × ${days}`);
            });

            const exportContainer = document.getElementById('exportContainer');
            const now = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            exportContainer.innerHTML = `
                <div class="export-header">
                    <h2>⚡ Electricity Usage Report</h2>
                    <p class="export-date">Generated on ${now}</p>
                </div>

                <div class="export-section">
                    <div class="export-section-title">Configuration</div>
                    <div class="export-item">
                        <span class="export-item-name">Days in Month:</span>
                        <span class="export-item-value">${days} days</span>
                    </div>
                    <div class="export-item">
                        <span class="export-item-name">Total Appliances:</span>
                        <span class="export-item-value">${selectedItems.length}</span>
                    </div>
                </div>

                <div class="export-section">
                    <div class="export-section-title">Appliances & Consumption</div>
                    ${breakdownItems.map(item => `
                        <div class="export-item">
                            <span class="export-item-name">${item.name}</span>
                            <span class="export-item-value">${item.units} kWh</span>
                        </div>
                        <div style="font-size: 11px; color: #9ca3af; padding: 0 0 8px 0;">
                            ${item.watts}W × ${item.hours}h/day
                        </div>
                    `).join('')}
                </div>

                <div class="export-summary">
                    <div class="export-summary-row">
                        <span class="export-summary-label">Total Monthly Usage:</span>
                        <span class="export-summary-value">${totalUnits.toFixed(2)} kWh</span>
                    </div>
                </div>

                <div class="export-formula">
                    <strong>Formula:</strong><br>
                    (${formulaParts.join(' + ')}) = ${totalUnits.toFixed(2)} kWh
                </div>
            `;

            html2canvas(exportContainer, { 
                scale: 2,
                backgroundColor: '#ffffff',
                windowHeight: exportContainer.scrollHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = `electricity_report_${new Date().getTime()}.png`;
                link.click();
            }).catch(err => {
                alert('Failed to capture image. Please try again.');
                console.error(err);
            });
        }

        // Initialize
        initializeAppliances();
        updateResults();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
