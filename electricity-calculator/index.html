<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electricity Calculator — estimate your monthly units</title>
    <meta
      name="description"
      content="Free, private electricity usage calculator. Estimate your monthly kWh and units device by device. Works offline. English & বাংলা."
    />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar">
      <div class="wrap topbar-inner">
        <a class="brand" href="./">
          <span class="brand-mark" aria-hidden="true">⚡</span>
          <span class="brand-text">
            <span class="brand-name" data-i18n="appName">Electricity Calculator</span>
            <span class="brand-tag" data-i18n="tagline"></span>
          </span>
        </a>
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="bn">বাংলা</button>
        </div>
      </div>
    </header>

    <main class="wrap layout" id="main">
      <!-- ============ INPUT COLUMN ============ -->
      <section class="col col-input" aria-label="Inputs">
        <!-- Title -->
        <div class="panel">
          <label class="field">
            <span class="field-label" data-i18n="titleLabel"></span>
            <input
              type="text"
              id="titleInput"
              class="text-input"
              data-i18n-ph="titlePlaceholder"
              maxlength="80"
            />
          </label>
        </div>

        <!-- Billing period -->
        <div class="panel period-panel">
          <div class="panel-head">
            <div class="panel-head-left">
              <h2 class="panel-title" data-i18n="periodHeading"></h2>
            </div>
            <button type="button" id="resetBtn" class="btn btn-ghost btn-sm" hidden data-i18n="reset" data-i18n-title="tipReset"></button>
          </div>
          <p class="panel-hint" data-i18n="periodHint"></p>
          <div class="seg" role="tablist" aria-label="Period mode">
            <button type="button" class="seg-btn is-on" id="modeDaysBtn" data-mode="days" data-i18n="modeDays"></button>
            <button type="button" class="seg-btn" id="modeRangeBtn" data-mode="range" data-i18n="modeRange"></button>
          </div>

          <div id="daysWrap" class="period-body">
            <label class="field">
              <span class="field-label" data-i18n="daysLabel"></span>
              <input type="number" id="daysInput" class="text-input" min="1" step="1" value="30" inputmode="numeric" />
            </label>
          </div>

          <div id="rangeWrap" class="period-body two-col" hidden>
            <label class="field">
              <span class="field-label" data-i18n="startLabel"></span>
              <input type="date" id="startInput" class="text-input" />
            </label>
            <label class="field">
              <span class="field-label" data-i18n="endLabel"></span>
              <input type="date" id="endInput" class="text-input" />
            </label>
            <div class="days-computed" id="daysComputed"></div>
            <span class="occupied-error" id="dateRangeError" hidden></span>
          </div>

          <label class="field occupied-field">
            <span class="field-label" data-i18n="occupiedLabel"></span>
            <input type="number" id="occupiedInput" class="text-input" min="0" step="1" inputmode="numeric" placeholder="" />
            <span class="field-hint" data-i18n="occupiedHint"></span>
            <span class="occupied-error" id="occupiedError" hidden></span>
          </label>
        </div>

        <!-- Add device -->
        <div class="panel">
          <div class="panel-head">
            <div class="panel-head-left">
              <h2 class="panel-title" data-i18n="addHeading"></h2>
            </div>
            <select id="scenarioSelect" class="btn btn-ghost btn-sm scenario-select"></select>
          </div>
          <p class="panel-hint" data-i18n="addHint"></p>
          <div class="add-form">
            <label class="field add-device">
              <span class="field-label" data-i18n="deviceLabel"></span>
              <div id="deviceCb"></div>
            </label>
            <div id="addNormalFields">
              <div class="item-fields three">
                <label class="field add-watt">
                  <span class="label-row"><span class="field-label" data-i18n="wattLabel"></span><span class="req-star" aria-hidden="true"> *</span></span>
                  <div class="watt-edit">
                    <div id="wattCb"></div>
                  </div>
                </label>
                <label class="field add-hours">
                  <span class="label-row"><span class="field-label" id="addHoursLabel"></span><span class="req-star" aria-hidden="true"> *</span></span>
                  <div class="hours-wrap">
                    <input type="number" id="hoursInput" class="text-input" min="0" max="24" step="0.5" value="1" inputmode="decimal" />
                    <select id="addHoursUnit" class="text-input it-hoursunit">
                      <option value="h/day" data-i18n="unitHDay"></option>
                      <option value="min/day" data-i18n="unitMinDay"></option>
                      <option value="h/week" data-i18n="unitHWeek"></option>
                      <option value="min/week" data-i18n="unitMinWeek"></option>
                    </select>
                  </div>
                </label>
                <label class="field add-daysmode">
                  <span class="field-label" data-i18n="daysUsedLabel"></span>
                  <select id="addDaysMode" class="text-input">
                    <option value="all" data-i18n="srcAll"></option>
                    <option value="present" data-i18n="srcPresent"></option>
                    <option value="custom" data-i18n="srcCustom"></option>
                  </select>
                </label>
              </div>
            <label class="field add-customdays" hidden>
              <span class="field-label" data-i18n="segDays"></span>
              <input type="number" id="addCustomDays" class="text-input" min="1" step="1" value="1" inputmode="numeric" />
              <span class="occupied-error" id="addCustomDaysError" hidden></span>
            </label>
            </div>
            <div id="addSplitFields" hidden>
              <div class="item-fields one">
                <label class="field add-watt-split">
                  <span class="field-label" data-i18n="wattLabel"></span>
                  <div class="watt-edit">
                    <div id="wattCbSplit"></div>
                    <span class="watt-suffix" data-i18n="wattShort"></span>
                  </div>
                </label>
              </div>
              <div class="segments" id="addSegments">
                <div class="seg-row" data-sid="0">
                  <label class="seg-field"><span data-i18n="segHours"></span>
                  <input type="number" class="text-input seg-hours" min="0" max="24" step="0.5" value="1" inputmode="decimal"></label>
                  <label class="seg-field"><span data-i18n="segDays"></span>
                  <input type="number" class="text-input seg-days" min="0" step="1" value="1" inputmode="numeric"></label>
                  <button type="button" class="icon-btn seg-remove" disabled title="" aria-label="">✕</button>
                </div>
              </div>
              <button type="button" class="btn btn-ghost btn-sm seg-add" id="addSegBtn" data-i18n="addSegment" data-i18n-title="tipAddSegment"></button>
              <div class="seg-note" id="addSegNote"></div>
              <span class="occupied-error" id="addSegDaysError" hidden></span>
            </div>
            <div class="chk-row split-toggle">
              <input type="checkbox" id="addSplitToggle" data-i18n-title="tipSplit"> <span data-i18n="segmentsToggle"></span>
            </div>
            <div class="it-note-row" id="addNoteRow">
              <button type="button" class="it-note-add btn-link" id="addNoteBtn" data-i18n="addNote" data-i18n-title="tipAddNote"></button>
              <div class="it-note-wrap" id="addNoteWrap" hidden>
                <textarea class="it-note text-input" id="addNoteInput" rows="2" placeholder="" data-i18n-ph="notePlaceholder"></textarea>
                <button type="button" class="it-note-hide btn-link" id="addNoteHide" data-i18n="hideNote" data-i18n-title="tipHideNote"></button>
              </div>
            </div>
            <button type="button" id="addBtn" class="btn btn-primary add-btn" data-i18n="addBtn"></button>
          </div>
        </div>

        <!-- Items -->
        <div class="panel">
          <div class="panel-head">
            <div class="panel-head-left">
              <h2 class="panel-title" data-i18n="itemsHeading"></h2>
              <span id="deviceCount" class="device-count-badge" hidden></span>
            </div>
            <div class="panel-actions">
              <button type="button" id="clearAllBtn" class="btn btn-ghost btn-sm" data-i18n="clearAll" data-i18n-title="tipClearAll"></button>
            </div>
          </div>
          <div id="itemsList" class="items"></div>
          <button type="button" id="addItemBtn" class="btn btn-ghost add-item-btn" hidden data-i18n="addBtn" data-i18n-title="tipAddItem"></button>
          <div id="emptyState" class="empty">
            <div class="empty-icon" aria-hidden="true">🔌</div>
            <div class="empty-title" data-i18n="emptyTitle"></div>
            <div class="empty-hint" data-i18n="emptyHint"></div>
          </div>
        </div>
      </section>

      <!-- ============ RESULTS COLUMN ============ -->
      <section class="col col-result" aria-label="Results">
        <div class="panel result-panel">
          <h2 class="panel-title" data-i18n="resultsHeading"></h2>
          <div class="total-card">
            <div class="total-label" data-i18n="totalLabel"></div>
            <div class="total-value"><span id="totalKwh">0</span></div>
            <div class="total-unit" data-i18n="unit"></div>
          </div>

          <div class="result-actions">
            <button type="button" id="saveBtn" class="btn btn-secondary" data-i18n="save"></button>
            <button type="button" id="pdfBtn" class="btn btn-primary" data-i18n="downloadPdf"></button>
          </div>

          <h3 class="sub-title" data-i18n="perDeviceHeading"></h3>
          <div id="breakdown" class="breakdown"></div>
          <p id="noResult" class="muted" data-i18n="noResult"></p>

          <div id="summaryWrap" class="summary" hidden></div>

          <details class="formula" id="formulaSection">
            <summary data-i18n="formulaHeading"></summary>
            <div id="formulaBody" class="formula-body"></div>
          </details>
        </div>

        <div class="panel history-panel">
          <div class="panel-head">
            <h2 class="panel-title" data-i18n="history"></h2>
          </div>
          <div id="historyList" class="history"></div>
        </div>
      </section>
    </main>

    <!-- ============ FAQ ============ -->
    <section class="wrap faq-section" aria-label="FAQ">
      <h2 class="faq-heading" data-i18n="faqHeading"></h2>
      <div id="faqList" class="faq"></div>
    </section>

    <footer class="site-footer">
      <div class="wrap">
        <span>⚡ <span data-i18n="appName"></span></span>
        <a href="https://encryptioner.github.io/public-websites/" rel="noopener">more tools →</a>
      </div>
    </footer>

    <!-- Mobile sticky total -->
    <div class="mobile-total" id="mobileTotal" role="button" tabindex="0" aria-label="View results">
      <span class="mt-label" data-i18n="totalLabel"></span>
      <span class="mt-right"><b id="mobileKwh">0</b> <span data-i18n="unit"></span><span class="mt-arrow">↓</span></span>
    </div>
    <!-- Scroll to top -->
    <button type="button" id="toTopBtn" class="to-top"><span aria-hidden="true">↑</span></button>

    <!-- Custom confirm dialog -->
    <div id="confirmOverlay" class="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirmMsg" hidden>
      <div class="confirm-card">
        <p id="confirmMsg" class="confirm-msg"></p>
        <div class="confirm-btns">
          <button type="button" id="confirmCancelBtn" class="btn btn-ghost"></button>
          <button type="button" id="confirmOkBtn" class="btn btn-danger"></button>
        </div>
      </div>
    </div>
    <!-- Toast notification -->
    <div id="toastEl" class="toast" aria-live="polite"></div>

    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/i18n.js"></script>
    <script src="./assets/js/calc.js"></script>
    <script src="./assets/js/combobox.js"></script>
    <script src="./assets/js/storage.js"></script>
    <script src="./assets/js/pdf.js"></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
